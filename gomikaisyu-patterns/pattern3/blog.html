<script>
// ============================================
// microCMS 設定（※アカウント作成後に書き換え）
// ============================================
const MICROCMS_DOMAIN = 'ones-style'; // サービスID
const MICROCMS_API_KEY = '';           // APIキーをここに入れる
const MICROCMS_ENDPOINT = 'blog';      // エンドポイント名

// フォールバック用の静的データ（microCMS未設定時に表示）
const FALLBACK_POSTS = [
  {
    title: '1LDKのゴミ屋敷を2日間で完全清掃',
    category: 'ゴミ屋敷清掃',
    area: '西宮市',
    date: '2026-04-01',
    description: '10年以上手付かずだったお部屋を、スタッフ4名で2日間かけて清掃。キッチン・浴室の水回りも徹底的にクリーニングしました。',
    image: 'images/hero-before-after.png'
  },
  {
    title: '故人様への供養を含めた遺品整理',
    category: '遺品整理',
    area: '尼崎市',
    date: '2026-03-25',
    description: 'ご遺族様に寄り添い、お坊さんによる供養も行いながら丁寧に遺品を整理。大切な形見品はすべてご家族にお返ししました。',
    image: 'images/obousan.png'
  },
  {
    title: '引越し前の大量不用品を即日回収',
    category: '不用品回収',
    area: '大阪市',
    date: '2026-03-18',
    description: '引越し日まで3日しかない中、大型家具・家電を含む大量の不用品を即日対応。お客様に大変喜んでいただけました。',
    image: 'images/track-record.png'
  }
];

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
}

function renderCards(posts) {
  const grid = document.getElementById('blog-grid');
  if (!posts || posts.length === 0) {
    grid.innerHTML = '<p class="blog-loading">まだ記事がありません</p>';
    return;
  }
  grid.innerHTML = posts.map(function(post) {
    var imgSrc = post.image;
    if (imgSrc && imgSrc.url) imgSrc = imgSrc.url;
    return '<div class="blog-card">' +
      '<img src="' + imgSrc + '" alt="' + (post.title || '') + '" class="blog-card-img">' +
      '<div class="blog-card-body">' +
        '<span class="blog-card-tag">' + (post.category || '') + '</span>' +
        '<div class="blog-card-meta">' + formatDate(post.date || post.publishedAt) + ' ／ ' + (post.area || '') + '</div>' +
        '<h3 class="blog-card-title">' + (post.title || '') + '</h3>' +
        '<p class="blog-card-text">' + (post.description || '') + '</p>' +
      '</div>' +
    '</div>';
  }).join('');
}

// microCMSから取得、失敗時はフォールバック表示
if (MICROCMS_API_KEY) {
  fetch('https://' + MICROCMS_DOMAIN + '.microcms.io/api/v1/' + MICROCMS_ENDPOINT + '?limit=20&orders=-date', {
    headers: { 'X-MICROCMS-API-KEY': MICROCMS_API_KEY }
  })
  .then(function(res) { return res.json(); })
  .then(function(data) { renderCards(data.contents); })
  .catch(function() { renderCards(FALLBACK_POSTS); });
} else {
  renderCards(FALLBACK_POSTS);
}
</script>
